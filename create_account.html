<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
</head>

<body>
  <header class="main-header">
    <div class="header-content">
      <img src="logo.png" alt="QuickTix Logo" class="logo" />
      <h1 class="header-title">QuickTix</h1>
      <a href="index.html" class="logout-button">Se connecter</a>
    </div>
  </header>
  <div class="create-account-container">
    <div class="create-account-card">
      <div class="create-account-header">
        <h2>Création de compte</h2>
      </div>
      <form action="dashboard.html" class="create-account-form">
        <div class="input-group">
          <label for="lastname">Nom</label>
          <input type="text" id="lastname" name="lastname" placeholder="Entrez votre nom" />
        </div>
        <div class="input-group">
          <label for="firstname">Prénom</label>
          <input type="text" id="firstname" name="firstname" placeholder="Entrez votre prénom" />
        </div>
        <div class="input-group">
          <label for="email">Identifiant/Email</label>
          <input type="email" id="email" name="email" placeholder="Entrez votre identifiant" />
        </div>
        <div class="input-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" />
        </div>
        <div class="input-group">
          <label for="confirm_password">Confirmer le mot de passe</label>
          <input type="password" id="confirm_password" name="confirm_password"
            placeholder="Confirmez votre mot de passe" />
        </div>

        <button type="submit" class="create-account-button">
          Créer un compte
        </button>
      </form>
    </div>
  </div>
  <script src="validation.js"></script>
</body>

</html>
